name: MegaTree - Recovery Tree Generator

on:
  workflow_dispatch:
    inputs:
      dump_url:
        description: 'ROM dump URL (Git repo, ZIP, or gofile.io)'
        required: true
      dump_branch:
        description: 'Branch name for git repos (optional)'
        required: false
        default: ''
      recovery_type:
        description: 'Recovery type'
        required: true
        default: 'twrp'
        type: choice
        options: [twrp, ofox, shrp, pbrp]
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize disk space
        run: |
          sudo swapoff -a
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git python3-pip python3-venv \
            cpio lz4 zstd brotli unzip xz-utils \
            android-simg2img e2fsprogs \
            device-tree-compiler erofs-utils
          pip3 install --quiet pycryptodome

      - name: Check out MegaTree
        uses: actions/checkout@v4

      - name: Download dump
        id: download
        run: |
          URL="${{ github.event.inputs.dump_url }}"
          BRANCH="${{ github.event.inputs.dump_branch }}"
          mkdir -p /tmp/dump

          if echo "$URL" | grep -qiE '(git|github|gitlab|gitgud)'; then
            if [ -n "$BRANCH" ]; then
              git clone --depth=1 -b "$BRANCH" "$URL" /tmp/dump
            else
              git clone --depth=1 "$URL" /tmp/dump
            fi
          elif echo "$URL" | grep -qi 'gofile'; then
            CID=$(echo "$URL" | grep -oE '[a-f0-9]{24,}$' || basename "$URL")
            SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])")
            wget -q -O /tmp/dump.zip "https://${SERVER}.gofile.io/download/${CID}"
            unzip -qo /tmp/dump.zip -d /tmp/dump
            rm -f /tmp/dump.zip
          else
            wget -q -O /tmp/dump.zip "$URL"
            unzip -qo /tmp/dump.zip -d /tmp/dump
            rm -f /tmp/dump.zip
          fi

          echo "dump_dir=/tmp/dump" >> $GITHUB_OUTPUT
          ls -la /tmp/dump/

      - name: Run MegaTree
        id: megatree
        run: |
          python3 -m megatree \
            all /tmp/dump \
            --recovery ${{ github.event.inputs.recovery_type }} \
            --output /tmp/megatree-output \
            --force-extract \
            --release /tmp/releases

      - name: Upload recovery tree artifact
        uses: actions/upload-artifact@v4
        with:
          name: recovery-tree
          path: /tmp/megatree-output/
          if-no-files-found: warn

      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: recovery-${{ github.run_number }}
          name: "Recovery Tree Build #${{ github.run_number }}"
          body: |
            Recovery: `${{ github.event.inputs.recovery_type }}`
            Dump: `${{ github.event.inputs.dump_url }}`
          files: /tmp/releases/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
